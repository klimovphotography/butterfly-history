name: Deploy to Beget
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /root/butterfly
            git fetch origin main
            git reset --hard origin/main
            npm install
            test -f .env || { echo "Missing /root/butterfly/.env"; exit 1; }
            test -f "/root/butterfly/telegram bot/.env" || { echo "Missing /root/butterfly/telegram bot/.env"; exit 1; }
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          COMMIT="${{ github.sha }}"
          MESSAGE="Deploy ${STATUS} for ${REPO}. Commit: ${COMMIT}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" >/dev/null
